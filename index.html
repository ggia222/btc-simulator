<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Binance Futures Pro</title>

<script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>

<style>
body{
  margin:0;
  background:#0B0E11;
  color:#EAECEF;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

.topbar{
  padding:8px;
  border-bottom:1px solid #1E2329;
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  align-items:center;
}

button, select{
  background:#1E2329;
  border:1px solid #2B3139;
  color:#848E9C;
  padding:6px 10px;
  font-size:12px;
  border-radius:6px;
}

button.active{
  color:white;
  background:#2B3139;
}

.percentBox{
  font-size:13px;
  font-weight:600;
}

/* 🔥 차트 영역 */
#chart-wrapper{
  position:relative;
  width:100%;
  height:78vh;
}

/* 🔥 실제 차트 */
#chart{
  width:100%;
  height:100%;
}

/* 🔥 MA 범례 */
#maLegend {
  position: absolute;
  top: 10px;
  left: 10px;
  display: flex;
  gap: 12px;
  z-index: 999;
  font-size: 12px;
  font-weight: 500;
}

.ma-item {
  display: flex;
  align-items: center;
  gap: 4px;
  color: #ccc;
}

.ma-color {
  width: 10px;
  height: 10px;
  border-radius: 2px;
}
</style>
</head>

<body>

<div class="topbar">

<select onchange="changeSymbol(this.value)">
<option>BTCUSDT</option>
<option>ETHUSDT</option>
<option>BNBUSDT</option>
<option>SOLUSDT</option>
<option>XRPUSDT</option>
<option>DOGEUSDT</option>
</select>

<!-- Time Frame -->
<button onclick="changeTF('1m')" class="active">1m</button>
<button onclick="changeTF('5m')">5m</button>
<button onclick="changeTF('15m')">15m</button>
<button onclick="changeTF('1h')">1h</button>
<button onclick="changeTF('4h')">4h</button>
<button onclick="changeTF('1d')">1d</button>

<!-- MA -->
<button onclick="toggleMA(7)">MA7</button>
<button onclick="toggleMA(15)">MA15</button>
<button onclick="toggleMA(60)">MA60</button>
<button onclick="toggleMA(100)">MA100</button>
<button onclick="toggleMA(200)">MA200</button>

<button id="futureBtn" onclick="toggleDraw()">미래봉 OFF</button>
<button onclick="clearFuture()">미래봉 삭제</button>

<div id="futurePercent" class="percentBox"></div>

</div>

<!-- 🔥 핵심: wrapper 안에 chart + legend 같이 있어야 함 -->
<div id="chart-wrapper">
  <div id="chart"></div>
  <div id="maLegend"></div>
</div>

<script src="app.js"></script>

</body>
</html>
